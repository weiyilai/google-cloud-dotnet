name: Spanner tests against emulator (Spanner changes only)

on:
  pull_request:
    paths:
    - '**[Ss]panner**'
  push:
    branches:
      - main
    paths:
    - '**[Ss]panner**'

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
    services:
      emulator:
        image: gcr.io/cloud-spanner-emulator/emulator:1.5.55@sha256:ad54472fe7b161b9214f7f816f304b649a4779e348229c375ac067f5ed5a6422
        ports:
          - 9010:9010
          - 9020:9020

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        submodules: true
        persist-credentials: false

    - name: Setup .NET
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
      with:
        dotnet-version: |
          6.0.x
          8.0.x

    - name: Spanner Emulator
      env:
          SPANNER_EMULATOR_HOST: localhost:9010
          TEST_PROJECT: emulator-test-project
      run: |
        dotnet test -c Release ./apis/Google.Cloud.Spanner.Data/Google.Cloud.Spanner.Data.IntegrationTests --filter SupportedOnEmulator\!=No
        dotnet test -c Release ./apis/Google.Cloud.Spanner.Data/Google.Cloud.Spanner.Data.Snippets
